services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=${URL}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - './data/:/data/'
    ports:
      - '${PORT:-81}:80'
    labels:
      - homepage.group=Security
      - homepage.name=Vaultwarden
      - homepage.icon=vaultwarden
      - homepage.href=${URL}

